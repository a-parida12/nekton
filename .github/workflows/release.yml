name: Test and Release

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry install

      - name: View Poetry version
        run: poetry --version

      - name: Lint with flake8
        run: |
          poetry run flake8 nekton tests --exclude=nekton/externals --count --select=E9,F63,F7,F82 --show-source --statistics
          poetry run flake8 nekton tests --exclude=nekton/externals --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Security analysis with bandit
        run: poetry run bandit -r -lll -x ./nekton/externals ./nekton ./tests

      - name: Test with pytest
        run: poetry run python -m pytest -v tests

  release:
  needs: quality
  if: github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, 'chore(release):')
  runs-on: ubuntu-latest
  concurrency: release
  permissions:
    id-token: write
    contents: write

  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive
        token: ${{ secrets.GIT_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Configure git for semantic-release
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote set-url origin https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }}

    - name: Python Semantic Release
      id: release
      uses: python-semantic-release/python-semantic-release@v10.5.3
      env:
        GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
      with:
        github_token: ${{ secrets.GIT_TOKEN }}
        verbosity: "2"

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@v1.14.0
      if: steps.release.outputs.released == 'true'
      with:
        user: __token__
        password: ${{ secrets.PYPI_SECRET }}
      