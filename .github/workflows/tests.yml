name: Python Application Testing

on: [push]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Build package
        run: poetry build

  code-quality:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry install

      - name: Lint with flake8
        run: |
          poetry run flake8 nekton tests --exclude=nekton/externals --count --select=E9,F63,F7,F82 --show-source --statistics
          poetry run flake8 nekton tests --exclude=nekton/externals --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Security analysis with bandit
        run: |
          mkdir ci-logs
          poetry run bandit -r -lll -x ./nekton/externals -f txt -o ci-logs/bandit.log ./nekton ./tests

      - name: Archive bandit report
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: ci-logs/bandit.log

  code-coverage:
    needs: code-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry install

      - name: Test with coverage
        run: |
          poetry run pytest tests/ --cov-report=xml --cov=nekton --junitxml=./coverage.xml
          poetry run coverage report --fail-under=90 -m
          poetry run coverage html

      - name: Archive code coverage html report
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-report
          path: htmlcov/index.html

  test-312:
    needs: code-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry install

      - name: Test with pytest
        run: poetry run pytest tests/ --cov-report=xml --cov=nekton --junitxml=./coverage.xml
